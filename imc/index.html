<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="messi.ico" type="image/x-icon">
    <title>Calculadora de IMC</title>
</head>
<body>
    <main class="container">
      <div class="calculator-imc">
        <div class="title">
          <h1>Calculando IMC</h1>
        </div>
        
        <div class="input-box">
            <div class="input-field">
              <label for="weight">Peso(KG)</label>
             <input type="number" id="weight" placeholder="Ex: 70"> 
            </div>
    
          <div class="input-field">
            <label for="height">Altura(cm)</label>
            <input type="number" id="height" placeholder="Ex: 180">
          </div>
       </div>
     
        
          <div class="content-result">
            <h3>Resultado: </h3>
            <div id="response">
              
            </div>
          </div>

        <button class="btn" onclick="calculate()">Calcular</button>

    </div>
  </main>
    <script src="script.js"></script>
</body>
</html>
